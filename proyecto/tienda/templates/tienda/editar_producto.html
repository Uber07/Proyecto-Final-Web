{% extends 'tienda/base.html' %}
{% block content %}
<h1>Editar Producto</h1>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <p>Nombre: <input type="text" name="nombre" value="{{ producto.nombre }}" required></p>
    <p>Descripción: <textarea name="descripcion">{{ producto.descripcion }}</textarea></p>
    <p>Precio: <input type="number" step="0.01" name="precio" value="{{ producto.precio }}" required></p>
    <p>Stock: <input type="number" name="stock" value="{{ producto.stock }}"></p>
    <p>Categoría:
        <select name="categoria">
            <option value="">Sin categoría</option>
            {% for c in categorias %}
                <option value="{{ c.id }}" {% if producto.categoria == c %}selected{% endif %}>
                    {{ c.nombre }}
                </option>
            {% endfor %}
        </select>
    </p>
    <p>Imagen actual:
        {% if producto.imagen %}<img src="{{ producto.imagen.url }}" width="50">{% else %}Ninguna{% endif %}
    </p>
    <p>Cambiar imagen: <input type="file" name="imagen"></p>
    <button type="submit">Actualizar</button>
</form>
{% endblock %}
