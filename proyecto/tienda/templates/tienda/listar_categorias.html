{% extends 'tienda/base.html' %}
{% block content %}
<h1>Gestión de Categorías</h1>
<a href="{% url 'tienda:admin_crear_categoria' %}">➕ Nueva Categoría</a>
<ul>
    {% for c in categorias %}
        <li>{{ c.nombre }}
            <a href="{% url 'tienda:admin_editar_categoria' c.id %}">✏️ Editar</a>
            <a href="{% url 'tienda:admin_eliminar_categoria' c.id %}" onclick="return confirm('¿Eliminar esta categoría?')">🗑️ Eliminar</a>
        </li>
    {% empty %}
        <li>No hay categorías.</li>
    {% endfor %}
</ul>
{% endblock %}
